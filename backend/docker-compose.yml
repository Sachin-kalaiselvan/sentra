services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads:/app/uploads
    env_file: .env
    stop_grace_period: 5s
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - uploads:/app/uploads
    env_file: .env
    stop_grace_period: 5s
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  flower:
    build: .
    command: celery -A app.tasks.celery_app flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    env_file: .env
    stop_grace_period: 5s
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sentra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentra"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    stop_grace_period: 5s
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  uploads: