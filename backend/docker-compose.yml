services:
  postgres:
    image: postgres:16
    container_name: sentra-postgres
    environment:
      POSTGRES_DB: sentra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sentra-redis
    ports:
      - "6380:6379"
  qdrant:
    image: qdrant/qdrant
    container_name: sentra-qdrant
    ports:
      - "6333:6333"
volumes:
  postgres_data: