services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads:/app/uploads
    env_file: .env
    depends_on:
      - postgres
      - redis
      - qdrant

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - uploads:/app/uploads
    env_file: .env
    depends_on:
      - postgres
      - redis
      - qdrant

  flower:
    build: .
    command: celery -A app.tasks.celery_app flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sentra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  uploads: