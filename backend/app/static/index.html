<script>
async function upload() {
    const file = document.getElementById("fileInput").files[0];
    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("uploadResult").innerText =
        "Task ID: " + data.task_id;

    // Auto-fill task ID for convenience
    document.getElementById("taskId").value = data.task_id;
    document.getElementById("approveId").value = data.task_id;
}

async function checkStatus() {
    const id = document.getElementById("taskId").value;

    const res = await fetch(`/status/${id}`);
    const data = await res.json();

    document.getElementById("statusResult").innerText =
        JSON.stringify(data, null, 2);

    // 🔥 ADD AGENT TRACE DISPLAY
    showAgentTrace(data);
}

async function approve() {
    const id = document.getElementById("approveId").value;

    const res = await fetch(`/approve/${id}`, {
        method: "POST"
    });

    const data = await res.json();

    document.getElementById("approveResult").innerText =
        JSON.stringify(data, null, 2);
}


// ✅ SIMPLE AGENT TRACE (compatible with your backend)
function showAgentTrace(d) {
    const result = d.result || {};
    const extracted = result.extracted_data || {};
    const llm = result.llm_result || {};
    const actions = result.actions || [];

    let trace = "\n\n--- AGENT TRACE ---\n";

    // Extract Agent
    if (extracted.char_count > 0) {
        trace += `✓ Extract: Parsed ${extracted.char_count} chars\n`;
    } else {
        trace += `! Extract: Failed to extract text\n`;
    }

    // Reason Agent
    if (llm.document_type && llm.document_type !== "unknown") {
        trace += `✓ Reason: Classified as ${llm.document_type} (risk: ${result.risk_level})\n`;
    } else {
        trace += `! Reason: LLM failed (check GROQ_API_KEY)\n`;
    }

    // Action Agent
    if (actions.length > 0) {
        trace += `✓ Action: ${actions.length} actions generated\n`;
    } else if (result.requires_approval) {
        trace += `! Action: Waiting for approval\n`;
    } else {
        trace += `! Action: No actions triggered\n`;
    }

    // Memory Agent
    if ((result.memory_notes || []).length > 0) {
        trace += `✓ Memory: Stored in vector DB\n`;
    } else {
        trace += `! Memory: Not stored\n`;
    }

    document.getElementById("statusResult").innerText += trace;
}
</script>
